remote_theme: just-the-docs/just-the-docs

# ── Site identity ─────────────────────────────────────────
title: "AZ-305 Azure Messaging Deep Dive"
description: "AZ-305 Exam Prep — Azure Service Bus, Storage Queues, Event Grid & Event Hubs: product overviews, feature comparisons, SKU tables, and exam caveats."
url: "https://marcogrimaldi29.com"
baseurl: "/az-305-messaging"
logo: "/assets/images/logo-sunrise-domain.jpg"

# ── Theme settings ──────────────────────────────────────────────────
color_scheme:           dark
search_enabled:         true
search:
  heading_level:        2
  previews:             3
  preview_words_before: 5
  preview_words_after:  10
  tokenizer_separator:  /[\s/]+/
  rel_url:              true
  button:               false

# ── Navigation ───────────────────────────────────────────────────────
nav_sort: case_sensitive
